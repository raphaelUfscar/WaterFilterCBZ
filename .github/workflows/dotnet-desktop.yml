name: .NET Desktop (WPF)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    env:
      PROJECT_PATH: WaterFilterCBZ.csproj
      TEST_PROJECT_PATH: WaterFilterCBZ.Tests/WaterFilterCBZ.Tests.csproj
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            **/nuget.config
            **/Directory.Packages.props
            global.json

      - name: Restore
        run: |
          dotnet restore "${{ env.PROJECT_PATH }}"
          dotnet restore "${{ env.TEST_PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" -c "${{ env.CONFIGURATION }}" --no-restore

      - name: Test
        run: dotnet test "${{ env.TEST_PROJECT_PATH }}" -c "${{ env.CONFIGURATION }}" --no-restore

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c "${{ env.CONFIGURATION }}" --no-build -o "${{ github.workspace }}\artifacts\publish"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterFilterCBZ-publish-${{ github.run_number }}
          path: artifacts/publish/**
