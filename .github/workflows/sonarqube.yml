# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarQube analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# (this feature is available starting from SonarQube 9.7, Developer Edition and above)

# 1. Make sure you add a valid GitHub configuration to your SonarQube (Administration > DevOps platforms > GitHub)

# 2. Import your project on SonarQube
#     * Add your repository as a new project by clicking "Create project" from your homepage.
#
# 3. Select GitHub Actions as your CI and follow the tutorial
#     * a. Generate a new token and add it to your GitHub repository's secrets using the name SONAR_TOKEN
#          (On SonarQube, click on your avatar on top-right > My account > Security or ask your administrator)
#
#     * b. Copy/paste your SonarQube host URL to your GitHub repository's secrets using the name SONAR_HOST_URL
#
#     * c. Copy/paste the project Key into the args parameter below
#          (You'll find this information in SonarQube by following the tutorial or by clicking on Project Information at the top-right of your project's homepage)

# Feel free to take a look at our documentation (https://docs.sonarqube.org/latest/analysis/github-integration/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/sq/10)

name: SonarQube analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: sonarqube-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # allows SonarQube to decorate PRs with analysis results

jobs:
  analysis:
    name: Build, test, and analyze
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Prefer Variables, fallback to Secrets (either works)
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout (full history for blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK (net10 preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Setup Java (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json', '**/nuget.config', '**/*.props', '**/*.targets') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install SonarScanner for .NET
        shell: pwsh
        run: |
          dotnet tool update --global dotnet-sonarscanner
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global dotnet-sonarscanner
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Restore
        shell: pwsh
        run: dotnet restore

      - name: SonarScanner begin
        shell: pwsh
        run: |
          if (-not $env:SONAR_PROJECT_KEY) {
            throw "Missing SONAR_PROJECT_KEY. Set it in GitHub: Settings → Secrets and variables → Actions → Variables (recommended) or Secrets."
          }
          if (-not $env:SONAR_HOST_URL) { throw "Missing secret SONAR_HOST_URL" }
          if (-not $env:SONAR_TOKEN) { throw "Missing secret SONAR_TOKEN" }

          dotnet sonarscanner begin `
            /k:"$env:SONAR_PROJECT_KEY" `
            /d:sonar.host.url="$env:SONAR_HOST_URL" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.scm.provider=git `
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

      - name: Build
        shell: pwsh
        run: dotnet build --no-restore -c Release

      - name: Test (if test projects exist) + coverage
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path . -Recurse -Filter "*Tests*.csproj" -File -ErrorAction SilentlyContinue
          if (-not $testProjects) {
            $testProjects = Get-ChildItem -Path . -Recurse -Filter "*Test*.csproj" -File -ErrorAction SilentlyContinue
          }

          if (-not $testProjects) {
            Write-Host "No test projects found. Skipping dotnet test."
            exit 0
          }

          dotnet test --no-build -c Release `
            /p:CollectCoverage=true `
            /p:CoverletOutputFormat=opencover `
            /p:CoverletOutput=./TestResults/coverage.opencover.xml

      - name: SonarScanner end
        shell: pwsh
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

      - name: Quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 10
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
