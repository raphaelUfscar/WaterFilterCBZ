name: SonarQube

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore

      # 🔥 START SONAR (WITH COVERAGE PATH)
      - name: Sonar Begin
        run: |
          dotnet sonarscanner begin `
            /k:"raphaelUfscar_WaterFilterCBZ" `
            /o:"raphaelufscar" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/coverage/*.xml" `
            /d:sonar.verbose=true

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # 🔥 RUN TESTS + COVERAGE (DETERMINISTIC OUTPUT)
      - name: Test with coverage
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"raphaelUfscar_WaterFilterCBZ" /o:"raphaelufscar" /d:sonar.token="$env:SONAR_TOKEN"
          dotnet build
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
