name: SonarQube

# Run static analysis on pushes to main and on pull request updates. Pull request
# analysis is triggered when the PR is opened, updated with new commits, or
# reopened.
on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    # The application targets net10.0-windows and uses WPF, so analysis must
    # build on a Windows runner.
    runs-on: windows-latest

    steps:
      # Checkout with full history so SonarQube can compute blame, changed-code
      # metrics, and pull request analysis accurately.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Java because the SonarScanner for .NET uses the SonarQube engine,
      # which requires a JVM during analysis.
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # Install the .NET SDK used to restore, build, test, and run the scanner.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Install the SonarScanner .NET global tool for this runner session.
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      # Restore all NuGet dependencies before beginning analysis and building.
      - name: Restore
        run: dotnet restore

      # Start SonarQube analysis. The token is passed through an environment
      # variable so it is not interpolated directly into the workflow command.
      # The OpenCover path matches the coverlet.collector output generated by
      # the test step below.
      - name: Sonar Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin `
            /k:"raphaelUfscar_WaterFilterCBZ" `
            /o:"raphaelufscar" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" `
            /d:sonar.verbose=true

      # Build the application in Release mode inside the SonarScanner begin/end
      # window so compiled code and project metadata are included in analysis.
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Run the unit tests and collect code coverage with coverlet.collector.
      # The data collector is configured to write OpenCover XML, which SonarQube
      # can import through sonar.cs.opencover.reportsPaths.
      - name: Test with coverage
        run: |
          dotnet test `
            --no-build `
            --configuration Release `
            --logger "trx" `
            --collect:"XPlat Code Coverage" `
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # Fail the workflow early if coverage was not generated. Without this
      # guard, SonarQube can complete analysis while reporting 0.0% coverage.
      - name: Verify coverage report
        run: |
          $coverageReports = Get-ChildItem -Path . -Recurse -Filter coverage.opencover.xml
          if ($coverageReports.Count -eq 0) {
            throw "No OpenCover coverage report was generated."
          }

          $coverageReports | ForEach-Object { Write-Host "Found coverage report: $($_.FullName)" }

      # Finish SonarQube analysis and upload the results to SonarCloud.
      # The token is again supplied via an environment variable to avoid passing
      # secrets directly through command-line interpolation.
      - name: Sonar End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
